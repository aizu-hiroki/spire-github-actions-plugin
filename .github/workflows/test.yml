name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write  # GitHub OIDC token (required for E2E node attestation)
  contents: read

jobs:
  # ----------------------------------------------------------------
  # Job 1: Unit tests
  # ----------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run unit tests
        run: go test ./... -v -count=1

  # ----------------------------------------------------------------
  # Job 2: E2E — real OIDC token against a local SPIRE server
  # ----------------------------------------------------------------
  e2e:
    name: E2E Test (OIDC node attestation)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      # Build both plugin binaries
      - name: Build plugins
        run: |
          go build -o /tmp/spire-server-plugin-github-actions ./cmd/nodeattestor-server
          go build -o /tmp/spire-agent-plugin-github-actions  ./cmd/nodeattestor-agent
          chmod +x /tmp/spire-server-plugin-github-actions /tmp/spire-agent-plugin-github-actions

      # Download SPIRE (same version as the GCP server)
      - name: Download SPIRE 1.9.6
        run: |
          curl -sSfL \
            "https://github.com/spiffe/spire/releases/download/v1.9.6/spire-1.9.6-linux-amd64-musl.tar.gz" \
            -o /tmp/spire.tar.gz
          tar xzf /tmp/spire.tar.gz -C /tmp
          echo "/tmp/spire-1.9.6/bin" >> "$GITHUB_PATH"

      # Write server config and start SPIRE server
      - name: Start SPIRE server
        run: |
          mkdir -p /tmp/spire-server-data

          cat > /tmp/server.conf << 'EOF'
          server {
            bind_address = "127.0.0.1"
            bind_port    = "8081"
            trust_domain = "example.org"
            data_dir     = "/tmp/spire-server-data"
            log_level    = "INFO"
          }

          plugins {
            DataStore "sql" {
              plugin_data {
                database_type     = "sqlite3"
                connection_string = "/tmp/spire-server-data/datastore.sqlite3"
              }
            }

            NodeAttestor "github_actions" {
              plugin_cmd = "/tmp/spire-server-plugin-github-actions"
              plugin_data {
                audience                    = "spire-server"
                allowed_repository_owners   = ["aizu-hiroki"]
              }
            }

            KeyManager "disk" {
              plugin_data {
                keys_path = "/tmp/spire-server-data/keys.json"
              }
            }
          }
          EOF

          spire-server run -config /tmp/server.conf &

          # Wait until the server admin socket is available
          for i in $(seq 1 20); do
            if spire-server healthcheck 2>/dev/null; then
              echo "SPIRE server is ready"
              break
            fi
            echo "Waiting for SPIRE server... ($i/20)"
            sleep 2
          done

      # Export the bootstrap trust bundle for the agent
      - name: Export trust bundle
        run: |
          spire-server bundle show > /tmp/bootstrap.crt
          echo "--- Trust bundle ---"
          cat /tmp/bootstrap.crt

      # Write agent config and start SPIRE agent
      - name: Start SPIRE agent and verify attestation
        run: |
          mkdir -p /tmp/spire-agent-data

          cat > /tmp/agent.conf << 'EOF'
          agent {
            data_dir          = "/tmp/spire-agent-data"
            log_level         = "INFO"
            server_address    = "127.0.0.1"
            server_port       = 8081
            socket_path       = "/tmp/spire-agent.sock"
            trust_domain      = "example.org"
            trust_bundle_path = "/tmp/bootstrap.crt"
          }

          plugins {
            NodeAttestor "github_actions" {
              plugin_cmd = "/tmp/spire-agent-plugin-github-actions"
              plugin_data {
                audience = "spire-server"
              }
            }

            KeyManager "memory" {
              plugin_data {}
            }

            WorkloadAttestor "unix" {
              plugin_data {}
            }
          }
          EOF

          spire-agent run -config /tmp/agent.conf &

          # Poll until the agent SVID is available (= attestation succeeded)
          for i in $(seq 1 20); do
            if spire-agent api fetch x509 -socketPath /tmp/spire-agent.sock 2>/dev/null; then
              echo "✓ Agent attested successfully and received an SVID"
              exit 0
            fi
            echo "Waiting for agent attestation... ($i/20)"
            sleep 3
          done

          echo "✗ Agent did not attest within the timeout"
          exit 1

      # Dump diagnostics when something goes wrong
      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== SPIRE server health ==="
          spire-server healthcheck 2>&1 || true
          echo "=== Registered entries ==="
          spire-server entry show 2>&1 || true
          echo "=== Attested agents ==="
          spire-server agent show 2>&1 || true
